ko_kr:
  KemonoNoMori:
    fumble: "대실패"
    critical: "대성공（성공도+%{success_degree}, 다음 지속 판정의 목표치를 10으로 변경）"
    success: "성공（성공도+%{success_degree}）"
    trap_not_activated: "함정 작동 체크(1D12) ＞ %{check_num} ＞ 함정이 작동하지 않았다"
    trap_activated_small: "함정 작동 체크(1D12) ＞ %{check_num} ＞ 함정이 작동했다！ ＞ 먹잇감표(%{chase_num}) ＞ 소형 동물이 함정에 걸려 있었다"
    trap_activated_large: "함정 작동 체크(1D12) ＞ %{check_num} ＞ 함정이 작동했다！ ＞ 먹잇감표(%{chase_num}) ＞ 대형 동물이 함정에 걸려 있었다"
    trap_activated_human: "함정 작동 체크(1D12) ＞ %{check_num} ＞ 함정이 작동했다！ ＞ 먹잇감표(%{chase_num}) ＞ 인간 방랑자가 함정에 걸려 있었다"
    reappear: "재등장: %{hours}시간 후"
    table:
      FT:
        name: "대실패표"
        type: "1D12"
        items:
        - ["1..3", "【여유】가 3점 감소한다（최소 0까지）"]
        - ["4..5", "무작위 짐 1개가 떨어져 행방불명이 된다（대실패한 구역의 아이템 조사로 발견 가능）"]
        - ["6..7", "무작위 짐 1개가 파괴된다"]
        - ["8..9", "무작위 날씨표(RWT)를 사용하고, 결과를 턴 종료까지 적용한다"]
        - ["10", "무작위로 준비 중인 소도구 1개가 파괴된다"]
        - ["11", "장착 중인 방어구가 파괴된다"]
        - ["12", "준비 중인 무기가 파괴된다"]
      RST:
        name: "능력치 무작위 결정표"
        type: "1D12"
        items:
        - ["1..2", "【이동】"]
        - ["3..4", "【격투】"]
        - ["5..6", "【사격】"]
        - ["7..8", "【제작】"]
        - ["9..10", "【감지】"]
        - ["11..12", "【자제】"]
      RTT:
        name: "무작위 소요 시간표"
        type: "1D12"
        items:
        - ["1..3", "2"]
        - ["4..6", "3"]
        - ["7..9", "4"]
        - ["10..12", "5"]
      RET:
        name: "무작위 소모표"
        type: "1D12"
        items:
        - ["1..3", "0"]
        - ["4..6", "1"]
        - ["7..9", "2"]
        - ["10..12", "4"]
      RWT:
        name: "무작위 날씨표"
        type: "1D12"
        items:
        - ["1..2", "짙은 안개"]
        - ["3..4", "폭우"]
        - ["5..6", "뇌우"]
        - ["7..8", "강풍"]
        - ["9..10", "혹서"]
        - ["11..12", "혹한"]
      RWDT:
        name: "무작위 날씨 지속표"
        type: "1D12"
        items:
        - ["1..2", "1턴"]
        - ["3..4", "3턴"]
        - ["5..6", "6턴"]
        - ["7..8", "24턴"]
        - ["9..10", "72턴"]
        - ["11..12", "156턴"]
      ROMT:
        name: "무작위 엄폐물표（야외）"
        type: "1D12"
        items:
        - ["1..2", "【덤불】내구도3, 경감치1, 특수효과: 컨택트 내 캐릭터에 대한 사격 공격 판정에 -1 수정 부가"]
        - ["3..5", "【나무】내구도5, 경감치2, 특수효과: 컨택트 내 캐릭터에 대한 사격 공격 판정에 -1 수정 부가"]
        - ["6..8", "【큰 나무】내구도7, 경감치3, 특수효과: 컨택트 내 캐릭터에 대한 사격 공격 판정에 -2 수정 부가"]
        - ["9..10", "【바위】내구도6, 경감치4, 특수효과: 컨택트 내 캐릭터에 대한 사격 공격 판정에 -1 수정 부가 / 컨택트 내에서 이루어지는 격투 공격의 대미지 +1"]
        - ["11..12", "【암벽】내구도8, 경감치4, 특수효과: 컨택트 내 캐릭터에 대한 사격 공격 판정에 -2 수정 부가 / 컨택트 내에서 이루어지는 격투 공격의 대미지 +2"]
      RIMT:
        name: "무작위 엄폐물표（실내）"
        type: "1D12"
        items:
        - ["1..4", "【목재 벽】내구도4, 경감치2, 특수효과: 컨택트 내 캐릭터에 대한 사격 공격 판정에 -1 수정 부가"]
        - ["5..8", "【목재 문】내구도4, 경감치2, 특수효과: 컨택트 내 캐릭터에 대한 사격 공격 판정에 -1, 접촉 판정과 돌격 판정에 -2 수정 부가"]
        - ["9..12", "【목제 가구】내구도3, 경감치2, 특수효과: 컨택트 내에서 이루어지는 격투 공격의 대미지 +1"]
      EET:
        name: "도주 체험표"
        type: "1D12"
        items:
