ko_kr:
  KemonoNoMori:
    fumble: "대실패"
    critical: "대성공（성공도+%{success_degree}, 다음 지속 판정의 목표치를 10으로 변경）"
    success: "성공（성공도+%{success_degree}）"
    trap_not_activated: "함정 작동 체크(1D12) ＞ %{check_num} ＞ 함정이 작동하지 않았다"
    trap_activated_small: "함정 작동 체크(1D12) ＞ %{check_num} ＞ 함정이 작동했다！ ＞ 먹잇감표(%{chase_num}) ＞ 소형 동물이 함정에 걸려 있었다"
    trap_activated_large: "함정 작동 체크(1D12) ＞ %{check_num} ＞ 함정이 작동했다！ ＞ 먹잇감표(%{chase_num}) ＞ 대형 동물이 함정에 걸려 있었다"
    trap_activated_human: "함정 작동 체크(1D12) ＞ %{check_num} ＞ 함정이 작동했다！ ＞ 먹잇감표(%{chase_num}) ＞ 인간 방랑자가 함정에 걸려 있었다"
    reappear: "재등장: %{hours}시간 후"
    table:
      FT:
        name: "대실패표"
        "1_3": "【여유】가 3점 감소한다（최소 0까지）"
        "4_5": "무작위 짐 1개가 떨어져 행방불명이 된다（대실패한 구역의 아이템 조사로 발견 가능）"
        "6_7": "무작위 짐 1개가 파괴된다"
        "8_9": "무작위 날씨표(RWT)를 사용하고, 결과를 턴 종료까지 적용한다"
        "10": "무작위로 준비 중인 소도구 1개가 파괴된다"
        "11": "장착 중인 방어구가 파괴된다"
        "12": "준비 중인 무기가 파괴된다"
      RST:
        name: "능력치 무작위 결정표"
        "1_2": "【이동】"
        "3_4": "【격투】"
        "5_6": "【사격】"
        "7_8": "【제작】"
        "9_10": "【감지】"
        "11_12": "【자제】"
      RTT:
        name: "무작위 소요 시간표"
        "1_3": "2"
        "4_6": "3"
        "7_9": "4"
        "10_12": "5"
      RET:
        name: "무작위 소모표"
        "1_3": "0"
        "4_6": "1"
        "7_9": "2"
        "10_12": "4"
      RWT:
        name: "무작위 날씨표"
        "1_2": "짙은 안개"
        "3_4": "폭우"
        "5_6": "뇌우"
        "7_8": "강풍"
        "9_10": "혹서"
        "11_12": "혹한"
      RWDT:
        name: "무작위 날씨 지속표"
        "1_2": "1턴"
        "3_4": "3턴"
        "5_6": "6턴"
        "7_8": "24턴"
        "9_10": "72턴"
        "11_12": "156턴"
      ROMT:
        name: "무작위 엄폐물표（야외）"
        "1_2": "【덤불】내구도3, 경감치1, 특수효과: 컨택트 내 캐릭터에 대한 사격 공격 판정에 -1 수정 부가"
        "3_5": "【나무】내구도5, 경감치2, 특수효과: 컨택트 내 캐릭터에 대한 사격 공격 판정에 -1 수정 부가"
        "6_8": "【큰 나무】내구도7, 경감치3, 특수효과: 컨택트 내 캐릭터에 대한 사격 공격 판정에 -2 수정 부가"
        "9_10": "【바위】내구도6, 경감치4, 특수효과: 컨택트 내 캐릭터에 대한 사격 공격 판정에 -1 수정 부가 / 컨택트 내에서 이루어지는 격투 공격의 대미지 +1"
        "11_12": "【암벽】내구도8, 경감치4, 특수효과: 컨택트 내 캐릭터에 대한 사격 공격 판정에 -2 수정 부가 / 컨택트 내에서 이루어지는 격투 공격의 대미지 +2"
      RIMT:
        name: "무작위 엄폐물표（실내）"
        "1_4": "【목재 벽】내구도4, 경감치2, 특수효과: 컨택트 내 캐릭터에 대한 사격 공격 판정에 -1 수정 부가"
        "5_8": "【목재 문】내구도4, 경감치2, 특수효과: 컨택트 내 캐릭터에 대한 사격 공격 판정에 -1, 접촉 판정과 돌격 판정에 -2 수정 부가"
        "9_12": "【목제 가구】내구도3, 경감치2, 특수효과: 컨택트 내에서 이루어지는 격투 공격의 대미지 +1"
      EET:
        name: "도주 체험표"
        "1_3": "【여유】가 0이 된다"
        "4_6": "임의의 【유대】를 합계 2점 감소시킨다"
        "7_9": "모든 짐을 잃는다（도주한 구역에 배치되며, 조사로 발견 가능）"
        "10_12": "모든 무기와 방어구와 소도구와 짐을 잃는다（도주한 구역에 배치되며, 조사로 발견 가능）"
      GFT:
        name: "식재료 채집표"
        "1_2": "먹을 수 있는 뿌리（영양가:2）"
        "3_5": "먹을 수 있는 풀（영양가:3）"
        "6_8": "먹을 수 있는 열매（영양가:5）"
        "9_10": "소형 동물（영양가:10）"
        "11": "대형 동물（영양가:40）"
        "12": "징그러운 벌레（영양가:1）"
      GWT:
        name: "물 채집표"
        "1_6": "오염수"
        "7_11": "음료수"
        "12": "독수"
      WST:
        name: "백색 마석 효과표"
        type: "1D12"
        items:
          - "도움이 안 되는 것의 색을 바꾼다"
          - "도움이 안 되는 것을 크게 만든다"
          - "도움이 안 되는 것을 작게 만든다"
          - "도움이 안 되는 것을 보존한다"
          - "도움이 안 되는 것을 복원한다"
          - "도움이 안 되는 것을 소환한다"
          - "도움이 안 되는 것을 움직인다"
          - "도움이 안 되는 것을 늘린다"
          - "도움이 안 되는 것을 붙인다"
          - "도움이 안 되는 것을 만들어낸다"
          - "소형 동물을 소환한다"
          - "대형 동물을 소환한다"
      HPT:
        name: "인간 부위표"
        "1_2": "오른팔 부위"
        "3_4": "왼팔 부위"
        "5_6": "오른쪽 다리 부위"
        "7_8": "왼쪽 다리 부위"
        "9_11": "몸통 부위"
        "12": "머리 부위"
      PDT:
        name: "부위 피해 단계표"
        "1_6": "경상"
        "7_10": "중상"
        "11": "파괴"
        "12": "상실"
      QPT:
        name: "네발 동물 부위표"
        "1_2": "이형"
        "3": "무기"
        "4": "오른쪽 앞다리 부위"
        "5": "왼쪽 앞다리 부위"
        "6": "오른쪽 뒷다리 부위"
        "7": "왼쪽 뒷다리 부위"
        "8_10": "몸통 부위"
        "11_12": "머리 부위"
      APT:
        name: "무족 동물 부위표"
        "1_3": "이형"
        "4_6": "무기"
        "7_10": "몸통 부위"
        "11_12": "머리 부위"
      TPT:
        name: "두발 동물 부위표"
        "1": "이형"
        "2": "무기"
        "3": "오른팔 부위"
        "4": "왼팔 부위"
        "5_6": "오른쪽 다리 부위"
        "7_8": "왼쪽 다리 부위"
        "9_11": "몸통 부위"
        "12": "머리 부위"
      BPT:
        name: "새 부위표"
        "1": "이형"
        "2": "무기"
        "3_4": "오른쪽 날개（오른팔 부위）"
        "5_6": "왼쪽 날개（왼팔 부위）"
        "7": "오른쪽 다리 부위"
        "8": "왼쪽 다리 부위"
        "9_11": "몸통 부위"
        "12": "머리 부위"
      CPT:
        name: "두족 동물 부위표"
        "1": "이형"
        "2": "무기"
        "3": "오른팔 부위"
        "4": "왼팔 부위"
        "5_7": "오른쪽 다리 부위"
        "8_10": "왼쪽 다리 부위"
        "11": "몸통 부위"
        "12": "머리 부위"
      IPT:
        name: "곤충 부위표"
        "1_2": "이형"
        "3": "무기"
        "4": "오른쪽 앞다리 부위"
        "5": "왼쪽 앞다리 부위"
        "6": "오른쪽 중간다리 부위"
        "7": "왼쪽 중간다리 부위"
        "8": "오른쪽 뒷다리 부위"
        "9": "왼쪽 뒷다리 부위"
        "10_11": "몸통 부위"
        "12": "머리 부위"
      SPT:
        name: "거미 부위표"
        "1": "이형"
        "2": "무기"
        "3": "오른쪽 첫번째 다리 부위"
        "4": "왼쪽 첫번째 다리 부위"
        "5": "오른쪽 두번째 다리 부위"
        "6": "왼쪽 두번째 다리 부위"
        "7": "오른쪽 세번째 다리 부위"
        "8": "왼쪽 세번째 다리 부위"
        "9": "오른쪽 네번째 다리 부위"
        "10": "왼쪽 네번째 다리 부위"
        "11": "몸통 부위"
        "12": "머리 부위"