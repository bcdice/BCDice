        - ["7..9", "모든 짐을 잃는다（도주한 구역에 배치되며, 조사로 발견 가능）"]
        - ["10..12", "모든 무기와 방어구와 소도구와 짐을 잃는다（도주한 구역에 배치되며, 조사로 발견 가능）"]
