    table:
      CO:
        name: 서훈 표
        year_title: 수훈 연령
        items:
        - 타락의 피：귀경은 타락자의 습격을 받았고, 그 결과 ⋯⋯기사가 되었다. 귀경에게 흐르는 것은 타락한 피다.
        - 수치스러운 피：광기에 사로잡힌 주인은 타락 직전 공작의 허락도 받지 않고 귀경을 서훈했다. 남겨진 귀경에게는 의혹의 눈초리가 향한다.
        - 부정한 거래：귀경은 주인과 부정한 거래 후, 서훈을 받았다. 주인은 부덕한 자, 이제 귀경의 입장은 주인의 노예나 다름없다.
        - 배신의 예언：서훈받을 때, 현자는 귀경에게 예언을 했다. ⋯⋯언젠가 믿었던 자에게 배신당할 날이 올 것이라고.
        - 모략：귀경은 기사에게 있을 수 없는 행실로 다른 사람을 밀어내고 서훈을 받았다. 그 비밀을 아는 사람은 없다. 현재로서는.
        - 불길한 예언：서훈받을 때, 현자는 귀경에게 예언을 했다. ⋯⋯소중한 사람을 자신의 손으로 죽이게 될 것이라고.
        - 타락의 유혹：서훈받을 때, 귀경의 뇌리에 타락한 자신이 떠올랐다. 그리고 타락해야 한다고 속삭여왔다. 지금까지도 때때로.
        - 부적합：다른 종자들은 모두 뛰어난 재능을 가지고 있었다. 귀경에게는 아무것도 없다 ⋯⋯. 그런데도 주인은 어째서인지 귀경을 선택했다.
        - 초라한 주인：서훈과 함께 사물을 보는 시각은 달라진다. 서훈 후, 주인이 시시한 존재로 느껴졌다. 귀경은 주인의 곁을 떠났다.
        - 가정이 있음에도：귀경은 백성으로서 가정을 이루고 있었다. 그러나 주인으로부터 서훈을 받을 수 있다면 하고 ⋯귀경은 가정을 버린 것이다.
        - 감언이설：귀경은 주인을 달콤한 말로 회유하고 현혹하여 서훈을 내리게 하였다. 심리적인 측면에서 주인은 오히려 ⋯⋯귀경이다.
        - 불안：기사란 무엇인가. 서훈이란 무엇인가. 기사 그 자체가 된 지금도 귀경은 형언할 수 없는 불안을 느끼고 있다⋯⋯.
        - 망각：누가 귀경을 기사로 삼았는가. 솔직히 알 수 없다. ⋯⋯정신을 차려보니 기사가 되어 있었다.
        - 어느 밤의 침실：그것은 충동적인 행동이었을 것이다. 주인은 어느 날 밤 갑자기 찾아와⋯⋯. 당신에게 입을 맞추고 서훈을 베풀었다.
        - 생존자：타락자, 혹은 태양의 파편의 습격을 받아, 주인의 종자는 전멸. 귀경만이 살아남아 서훈을 받았다.
        - 헌신의 맹세：서훈받을 때, 귀경은 백성을 계속 지키겠다고 맹세했다. 귀경은 백성의 방패이자, 수많은 적을 물리치는 창이다.
        - 사면：귀경은 죄를 지었다. 죄인으로 처벌받는 가운데 주인은 귀경을 인정하고 서훈까지 내려주었다. 보답을 해야만 한다.
        - 비밀의 맹세：서훈받을 때, 귀경은 주인으로부터 비밀을 들었다. 그리고 그것을 절대로 누설하지 않기로 맹세를 했다.
        - 한 명의 승자：그날 주인의 수많은 종자들 사이에서 무술 시합이 열렸다. 귀경은 마지막까지 살아남아 승리하고, 마침내 서훈을 얻은 것이다.
        - 단련된 기술：지금까지 하나의 기술을 연마해, 끝까지 단련했다. 그 우직하게 갈고 닦은 솜씨가 평가받아 귀경은 서훈을 받았다.
        - 무훈의 예언：서훈박을 때, 현자는 귀경에게 예언했다. ⋯⋯언젠가는 큰 혼란 속에서 눈부신 무훈을 이룰 것이라고.
        - 아물지 않은 상흔：귀경의 몸에는 지워지지 않는 상흔이 새겨져 있다. 그러나 상처를 입으면서까지 주인을 지킨 공이야말로 귀경을 기사로 만들었다.
        - 번영의 예언：서훈받을 때, 현자는 귀경에게 예언했다. ⋯⋯그 이름은 부귀와 영광으로 둘러싸여 평안할 것이라고.
        - 담력：귀경은 주인과 함께 타락한 자들의 습격을 받았을 때 한 걸음도 물러서지 않았고, 그 담대함을 인정받아 서훈을 받았다.
        - 우정의 예언：서훈받을 때, 현자는 귀경에게 예언했다. ⋯⋯언젠가 훌륭한 친구를 얻을 것이라고.
        - 회한：오랫동안 종자로 살아오면서 귀경은 늙었다. 그러나 나이 들어서도 주인에게는 귀경이 필요했다. 그래서 서훈을 내렸다.
        - 수호의 맹세：서훈받을 때, 어떤 사람을, 마을을, 나라를 지키겠다고 맹세했다. 그것을 등에 지고 적에게 맞서는 한, 귀경은 도망치지 않는다.
        - 갚지 못할 은혜：그날 귀경은 죽었다. ⋯⋯그러나 귀경은 주인의 서훈으로 되살아났다. 주인은 형벌을 받으면서도 웃고 계셨다.
        - 신앙의 맹세：서훈받을 때, 귀경은 드라클에 대한 독실한 신앙을 맹세했다. 붉은 달 아래, 귀경의 승리는 드라클에게 바쳐질 것이다.
        - 영원한 사랑：기사와 서로 사랑에 빠졌다. 달콤한 광란의 시간이 흘러갈 때. 귀경은 연인의 손으로 서훈을 받아 기사가 되었다.
        - 영웅의 예언：서훈받을 때, 현자는 귀경에게 예언했다. ⋯⋯두려운 적을 무찌르고 그 이름은 상야에 울려 퍼질 것이라고.
        - 충의의 맹세：서훈 때, 어떤 사람에게 깊은 충성을 맹세했다. 설령 세계를 적으로 돌린다고 해도 귀경이 배신하는 일은 없다.
        - 살아 있는 예술：서훈에 의해, 귀경의 미모는 한층 더 높아졌다. 이제 귀경을 보고 마음을 빼앗기지 않을 사람은 없다.
        - 예상외의 무훈：귀경은 종자의 몸으로 뜻하지 않은 무훈을 세웠다. 그 공은 서훈을 받기에 충분한 것이었다.
        - 당주의 총애：귀경은 공작가 당주 그 사람의 총애를 얻었다. 궁정에서 중요한 지위를 얻을 수 있을 것이다.
        - 시조의 총애：귀경은 시조의 총애를 얻었다. 진조 드라클과 가장 가까운 자랑스러운 인물의 한 사람이 된 것이다.
      CA:
        name: 서훈 후 표
        year_title: 기사력
        items:
        - 멸망：귀경의 영지는 적에게 멸망당했다. 지켜야 할 백성은 죽고 명예는 잃었다. 그 자들을 용서할 수는 없다.
        - 누명：귀경은 자신도 모르는 죄를 짊어지고 있다. 누군가의 음모가 귀경을 얽어매고 죄를 뒤집어씌운 것이다.
        - 저주：일찍이 귀경은 요정의 저주를 받았다. 저주는 천천히 귀경을 갉아먹고, 그 몸에 화를 초래하고 있다.
        - 피가 들끓다：전투 후에는 몸이 불타오르듯 격앙되어 견딜 수가 없다. 타락의 날이 멀지 않았다. ⋯⋯귀경에게는 그런런 확신이 있다.
        - 보복의 서장：일찍이 귀경의 명예는 친구에게 배신당하고 빼앗겼다. 지금은 새로운 길을 가고 있지만 복수는 지금도 잊지 않고 있다.
        - 원수：잊어서는 안될 적이 있다. 놈의 가슴을 꿰뚫고 목을 베기 전까지는 귀경에게 안식의 날은 없다. 오지 않을 것이다.
        - 타락의 공명：귀경의 영혼은 타락하고 있는 것일까. 타락한 자들이 속절없이 가깝게 느껴지는 것이다.
        - 부덕한 나날：과거 귀경은 품행이 바르다고 말하기 어려운 인물이었다. 마음을 다시 바로잡은 귀경이지만 아직 세간의 시선은 곱지 않다.
        - 주군의 타락：귀경을 서훈한 주인이 타락했다. 주인을 자랑스럽게 여겨 온 귀경은, 무심한 다른 기사로부터, 경멸이나 의혹을 받기 쉽다.
        - 명왕의 포로：명왕의 침공 중, 귀경은 패배하여 한때 포로의 수모를 당했다. 놈들을 용서할 수는 없다.
        - 친지의 타락：귀경의 친구나 연인이 타락했다. 그것은 결코 지워지거나 잊혀질 수 없다. 그것은 항상 마음 속에 망령처럼 고개를 든다.
        - 수라：귀경은 계속 싸워 왔다. 공을 다른 사람에게 넘겨주면서도 싸우고, 싸우고, 또 싸우는 것을 계속했다. 오로지 싸우기만 하는 존재가 되어 가고 있다.
        - 공백：기사가 되고 나서 기억이 나지 않는 시기가 있다. 그 사이에 무슨 일이 있었는지 귀경은 아무 것도 모른다.
        - 추적：타락한 친구를 찾고 있다. 그 사람이 소중하기에 귀경이 마무리를 지어야 하는 것이다.
        - 무료：변함없는 일상. 보람 없는 나날. 동료의 무훈을 듣고 귀경은 스스로도 공훈을 세우려고 일어섰다.
        - 실연：사랑이 깊다는 이유로 귀경은 사랑을 버렸다. ⋯⋯버리지 못한 것일지도 모르지만, 버렸다고 믿었다.
        - 은둔：전투에 허무함을 느낀 것은 언제부터인가. 용맹한 기사였던 귀경이지만 지금은 조용히 은자로 살고 있다.
        - 의문의 실종：귀경의 소중한 사람이 갑자기 사라져 버렸다. 납치 된 것인가, 도망친 것인가, 그도 아니라면 설마⋯⋯.
        - 우물 안 개구리：자신이야말로 최고의 기사라고 생각했던 귀경이지만 ⋯⋯그 기사를 보고 모든 것은 무너졌다. 아직 수련이 부족하다.
        - 현자의 예언：귀경은 예언에 이끌리고 있다. 귀경은 누군가를 만나야 한다. 그것은 주군인가 친구인가 연인인가 ⋯⋯혹은 적인가.
        - 염문：많은 사랑을 쏟아내는 귀경의 이름은 궁정에서 유명하다. 적도 아군도 분명 감당할 수 없을 정도로 많이 있을 것이다.
        - 관찰자：백성이 변화해 가는 모습을 가만히 지켜본다. 귀경은 쉴 새 없이 변해 가는 그들을 바라보는 것을 좋아한다.
        - 사람을 찾는 자：귀경의 마음을 움직인 어떤 사람을 찾고 있다. 백성이다. 백성은 연약하고 쉽게 변한다…… 서둘러 찾아야 한다.
        - 깊은 총애：귀경은  주군에게 깊은 사랑을 받아 왔다. 그 때문에 서훈을 받은 지는 꽤 오래되었지만, 기사로서의 활동은 이제 막 시작한 참이다.
        - 혈기왕성：귀경은  많은 기사들과 겨루며 자신의 기술과 힘을 갈고닦고 싶다. 실력 있는 기사를 보면 도전하지 않고는 못 배긴다.
        - 계몽：지고한 기사들과 달리 세상은 어리석고 가엾은 백성들로 가득하다. 기사로서 그들을 이끌어 주어야 하지 않겠는가…….
        - 서훈해야 할 자：서훈해야 할 사람이 있다. 반드시 기사로 만들어야 할 인물이다. 그 때문에 귀경은 공을 세우는 일에 조바심을 내기 시작했다.
        - 우국지사：귀경은 조국의 현 상황을 걱정한다. 궁정의 문제를 바로잡아야 한다고 깊이 마음속에 맹세하고 있다.
        - 서훈을 내린 경험：큰 공적은 없지만 나름 고참 기사로서, 귀경은 자신의 종자를 서훈하여 기사로 올린 경험이 있다.
        - 타락자의 포로：귀경은 한때 타락자의 포로가 되어 노리개로 지낸 적이 있다. 굴욕이자 오명이다⋯⋯.
        - 명승부：귀경은 자신의 의지를 관철하기 위해 결투에 나서 승리했다. 그 결투는 인근에서도 소문난 명승부로 전해진다.
        - 긴 잠：귀경은 한때 태양의 파편과 싸우다 몸의 많은 부분을 잃고 잠에 빠졌다…… 꽤 오랜 시간 잠들어 있었던 모양이다.
        - 세상은 넓다：기사가 된 뒤 세상의 넓음을 알게 되었다. 가능한 한 많은 것을 알고 싶다…… 귀경은  넓은 세상을 보고 듣고자 한다.
        - 왕의 자질：서훈을 받은 이후 사람들을 굴복시키는 압도적인 매력을 얻게 되었다. 그것은 마치 지배자가 되기 위해 주어진 자질과도 같다.
        - 명성：수많은 결투와 마상 시합에서 실력을 증명해 왔다. 귀경은 실력 있는 기사로 이름을 떨치고 있다.
        - 전설：귀경이 이룬 업적의 수 아직 미미하나, 그 일화는 전설의 영역. 이미 음유시인들의 노래로까지 불리고 있다.
      EP:
        name: 아득한 과거 표
        year_title: 기사력
        items:
        - 오래된 죄인：지옥이 태어나기 전. 누구나 잊은 감옥에 갇혀 있던 죄인. ...그것이 귀경이다. 수백 년이 지나 마침내 감옥은 뚫렸다.
        - 지옥 누출：귀경은 부덕과 타락을 거듭하여 지옥으로 유폐되었을 것이다. 하지만 정신을 차리자 밖이었고 수백 년이 지나가고 있었다.
        - 금기의 탐구：이미 죽은 한 사람의 백성 혹은 기사를 귀경은 되살리려 하고 있다. 외법의 종류다. 알고 있어도 체념할 수 없는 것이다.
        - 타락한 몸：한 번은 타락하고, 수치와 더러움으로 얼룩졌다. 마음씨 좋은 친구가 구해 주었지만 오명은 지금도 따라다닌다. 타락의 조짐이 모두 사라지더라도.
        - 겁쟁이의 실수：태양룡이 나타났을 때 귀경은 두려움에 토벌 소집에서 도망쳤다. 이 치욕은 오랜 시간이 지난 지금도 귀경의 마음을 괴롭히고 있다.
        - 무한한 복수：귀경은 이 세상의 불합리에 울었다. 그러므로 끝없는 복수를 시작했던 것이다. 이 세상 모두를 바꿔버리기 위해서.
        - 악의  발단：일찍이 귀경은 좋지 못한 생각에 사로잡혀 있었다. 과거의 활동은 지금도 사악한 후계자를 낳고 있다. 반드시 막아야 한다.
        - 요정의 고리：요정의 권유로 하룻밤 잔치를 즐겼다. 그리고 지금. 그로부터 몇백 년이 지났다. 귀경을 아는 기사는 별로 없다.
        - 파멸의 역병：그 무렵 역병은 노스페라스 이외에도 침범했다. 귀경의 고향 또한⋯. 백성을 구하지 못 한 귀경이 명왕을 책망할 수 있겠는가.
        - 주인의 타락：귀경을 서훈한 주인께서 타락하셨다. 주인를 자랑해 온 귀경은 자기 안에서 뭔가 소중한 것이 쑥 빠진 것 같았다.
        - 이단의 친구：과거 이단과 기사의 거리는 가까웠다. 귀경에게는 이단의 친구가 있고, 거리를 두면서도 서로 도와왔는데.
        - 시간을 초월하여：무슨 일이 있었는지 모르겠어. 하지만 깨달으면 아득한 미래의 대지에 서 있었다. 수백년의 공백이 지금도 귀경을 괴롭히고 있다.
        - 태양이 습격하다：태양룡의 습격을 귀경은 제대로 받았다. 지켜야 할 영지는 잃었고, 토벌해내야 할 태양룡도 내 손으로 치지 못한 것이다.
        - 수많은 타락：아는 사람 대부분이 타락해 갔다. 옛 친구 중 지금도 남아있는 자는 얼마 되지 않는다. 결코 타락하지 않으려고 굳은 결의를 하고 있지만.
        - 최후의 명령：태양룡 토벌 때 한 장군이 귀경을 감싸고 돌아오지 않는 사람이 되었다. 최후의 명령은 "살아라." 그 이래로 귀경은 명령을 계속 지키고 있다.
        - 지금은 옛 일：귀경은 복수를 해냈다. 그리고 할 일을 잃었다. 타락은 피했지만 새로운 삶의 보람을 찾아야 한다.
        - 지켜야 할 땅：한 영주가 타락했다. 참극 후 더 이상 그곳에는 아무도 살지 않는다. 하지만 귀경이 그와 보낸 추억은 있다. 지키지 않으면.
        - 개척자：백성들의 마음을 알고 싶어서.귀경은 홀로 황야를 일구었다. 이윽고 마을이 생겼고, 귀경은 영주가 되었다. 그 땅은 귀경의 제2의 고향이다.
        - 자신만이：태양룡 토벌 때 눈앞에서 게이즈발트 가문이 멸망했다. 귀경에게 용기가 있었다면 그 혈통은 남아있지 않았을까?
        - 신앙의 나날：주교으로서 사원에 틀어박혀 드라클에 대한 감사를 드렸다. 지금도 붉은 달을 올려다볼 때 귀경 안에는 감사가 가득하다.
        - 미동의 나날：귀경을 서훈해 준 주군에게서, 저택 안에서 애지중지 보살핌을 받아 왔다. 기사로서는 마뜩잖은 점도 있었지만, 한 인간으로서 그를 사랑하고 있다.
        - 방관하는 나날：백성이 바뀌는 모습을 물끄러미 바라보고 있다. 귀경은 어지럽게 변하는 그들을, 은자로서 바라보는 것이 좋았다.
        - 편력의 나날：편력기사로서 여러 영토를 방문하며, 수많은 기사, 수많은 모험, 수많은 사랑안에서 지내왔다. 지금도 색이 바래지 않는 아름다운 추억이다.
        - 충의의 나날：섬길 분을 발견하고 귀경은 모든 것을 바쳐 그 사람을 지켜왔다. 그 충성은 아직 손상되지 않았다⋯⋯.
        - 백성의 혈통：서훈을 받아 기사가 되었지만 천민 시절을 버리지 못했다. 귀경은 줄곧 자신의 혈연과 친구의 자손을 지켜보고 있다.
        - 긴 잠：피곤한가, 상처를 입어서? 귀경은 긴 잠을 잤다. 그리고 올해 겨우 눈을 떴다.
        - 명왕과 후회： 일찍이 노스페라스에서 지위를 얻었다. 그러나 그 재앙 속에서 귀경은 달아난 것이다. 명왕이 되어가는 그녀를 버려두고.
        - 발흥 협력자：귀경은 로젠부르크 발흥을 위해 그란츠 공과 협력해 왔다. 그의 이면도 겉도 잘 알고 그의 땅에서 세력도 쌓고 있다.
        - 노스페라스：귀경은 노스페라스 말기, 역병 속에서 서훈을 받아 구원받은 기사. 명왕과 그 일당의 풍평을 무엇보다 씁쓸하게 보아온 자다.
        - 재산：오랜 세월 동안 귀경은 많은 물건과 건물을 구현하고 영속화하였다. 귀경의 주위는 자신이 만들어낸 것들로 넘쳐난다.
        - 요정의 나라：기사 은퇴 후 역대 아발롬 공처럼 요정들의 나라에서 즐겁게 묻혀 있었다. 오늘 밤, 기사로서 세상에 나온 것은, 변덕에 지나지 않는다.
        - 수많은 서훈：수많은 싸움을 거쳐온 귀경은 수없이 무훈을 세워왔다. 하나하나를 세는 것도 이젠 어처구니없을 정도다.
        - 혈통의 중진：혈통이란 기사의 가장 큰 틀이자 파벌이다. 그리고 귀경은 혈통 내에서 큰 발언력을 가진 중진이다.
        - 시조의 간곡한 뜻：시조라도 쓸쓸할 때가 있다. 귀경은 한 시조와 친하게 지냈다. 그 사람에게 있어서 당신은 몇 안 되는 마음을 허락할 수 있는 존재이다.
        - 태양룡 토벌：그 가공할 태양룡 토벌에 참여해 화려한 활약을 펼쳤다. 그러면서도 귀경은 많은 희생자들을 보아 왔다.
        - 최초의 기사：귀경이야말로 진조의 백년상이 끝났을 때, 시조 그분으로부터 가장 먼저 서훈을 받은 기사. 상야의 모든 역사를 지켜본 산증인이시다.
      OS:
        name: 윈죄 표
        year_title: 외모 연령
        items:
        - 학대：그 지옥 같은 나날 속에서 그대가 당해 온 일을 떠올리면⋯ 누구든, 상야국 전체를 똑같이 저주할 수밖에 없다.
        - 들개처럼：고아였던 그대는 훔치고 죽이고 속이며 살아왔다. 수단은 가리지 않았다. 죄인으로 붙잡히지 않고 달아날 수 있었던 것은 하늘의 운이었을까.
        - 약육강식：폭력으로 원하는 것을 빼앗아 온 그대는 약탈자이자 사냥꾼이다. 아무리 겉을 꾸며도 세상을 지배하는 것은 짐승의 법칙뿐이다.
        - 검은 충동：폭력성과 잔혹성이 그대 안에 잠들어 있다. 그것은 때때로 돌연 모습을 드러내어⋯ 소중한 것을 파괴한다.
        - 얼어붙은 마음：혹독한 나날 속에서 그대의 마음은 얼어붙었다. 이단으로서 힘을 얻은 지금도⋯ 마음 속의 얼음은 아직 녹지 않았다.
        - 생존자：타락자, 혹은 태양의 파편의 습격을 받아 고향은 전멸했다. 그대만이 살아남았다. 짊어진 영혼은 수도 없이 많다.
        - 피의 갈증：백성의 몸을 흐르는 피에 기이한 집착을 느끼고 만다. 도저히 견딜 수 없을 때는 자기 피를 핥기까지 한다.
        - 조롱거리：언제나 주변에서 누군가가 비웃는다. 누구나 그대를 비웃는다. 무엇이 잘못되었다는 것인가, 무엇이 우스꽝스럽다는 것인가.
        - 죽은 이를 앞에 두고：소중한 사람이 죽었다. 썩어 가는 시체를 보고 죽음의 끔찍함을 알게 되었다. 무슨 일이 있어도 결코, 죽을 수는 없다.
        - 기사에 대한 질투：그대는 기사라는 존재를 질투하고 있었다. 아름답고 강하며 늙지 않는 자들⋯ 어째서 놈들은 찬란하고, 나는 비참한가.
        - 짊어진 죄：예전에, 잠깐의 장난기가 사람을 죽게 만들었다. 아무리 시간이 흘러도 처음 새겨진 죄는 사라지지 않는다.
        - 기사의 타락：잘 아는 기사가 타락하여 폭정을 저질렀다. 그대는 기사라는 존재가 이단과 조금도 다르지 않다는 것을 알고 있다.
        - 태양의 환상：예전부터 가끔 태양에 비친 대지의 꿈을 꾼다. 그것은 결코 나쁜 세계가 아니었던 것처럼 느껴지는데⋯.
        - 퇴폐：술과 색욕에 빠져 그대는 어찌할 도리 없는 폐물이 되어 있었다. 떠올리고 싶지도 않은, 나태와 탐욕에 빠져 있던 나날.
        - 허영：누군가에게 인정받고 싶어서, 자신을 거짓으로 덧칠해 왔다. 노력보다도 거짓을 더 쌓아 올리며 살아왔다.
        - 흑역사：예전의 자신은 약하고 어리석었다. 돌이켜 보면 머리를 쥐어뜯으며 사라져 버리고 싶다는 생각뿐이다.
        - 새겨진 공포：무서운 존재와 마주친 적이 있다. 타락자였을까, 요정이었을까, 태양이었을까. 그 공포는 아직도 그대 안에 새겨져 있다.
        - 혈기왕성：예전부터 지나치게 성급하다는 말을 들어 왔다. 하지만 세월이 흘러도 기질은 고쳐지지 않았다. 그대의 마음은 지금도 젊고 미숙하다.
        - 고독에 대한 공포：혼자인 것은 무섭다. 외로움은 공포다. 비위를 맞춰서라도, 이용당해서라도, 누군가 곁에 있어 주지 않으면 미쳐 버릴 것만 같다.
        - 들짐승처럼 자라다：숲이나 황야에서 홀로 살아왔다. 짐승도 인간도 다를 바 없다. 그저 한 마리 짐승으로 살아왔을 뿐이다.
        - 으르렁거리는 짐승：사람을 위압적으로 대하고 만다. 우호적으로 대하고 싶어도 그게 되지 않는다. 그대의 미소는 이빨을 드러낸 짐승과도 같다.
        - 변덕：어쩐지 눈앞의 것에 쉽게 정신이 팔린다. 차분히 생각하지 못한다. 세월이 흘러도 변하지 않는 성미다.
        - 공백：아주 먼 옛날, 이단의 힘을 얻기 전의 자신을 기억하지 못한다. 떠올리려 하면 머릿속에 안개가 낀다.
        - 소생의 염원：소중한 사람이 죽었다. 하지만 포기할 수 없다. 포기하지 않는다. 분명 어딘가에, 해결책이, 되살릴 방법이 있을 것이다.
        - 책벌레：조용히 책을 읽는 것을 좋아한다. 책 속의 세계, 자신의 세계에 몰두하고 싶다. 밖에서 뛰어다니는 것은 서툴다.
        - 늙고 추한 몸：늙어 썩어 가는 공포. 죽음에 대한 혐오. 필사적으로 몸부림치며 그대는 그것으로부터 달아나려 했다.
        - 호기심：눈길을 끄는 것이 있으면 반드시 바라본다. 비밀이라면 파헤치지 않고는 견딜 수 없다. 모른 채 넘어갈 수는 없는 것이다.
        - 사랑에 약함：쉽게 사랑에 빠지고 만다. 사소한 인연만으로도 연인이라 여겨 마음까지 다 바치고 만다.
        - 이루어질 수 없는 첫사랑：어떤 백성을 사랑했다. 사랑은 이루어지지 않았고, 그 사람은 그대의 앞에서 사라졌다. 하지만 그 미소는 지금도 그대에게 힘을 준다.
        - 순수한 영혼：속세의 사념에서 너무나 멀리 떨어져 살아왔기에, 그대의 영혼은 끝없이 티 없이 아름답다. 그리고 연약하다.
        - 평온：그대는 가족에게 둘러싸여 사랑이 가득한 삶을 살았다. 평범한 생활, 평범한 나날. 아주, 아주 행복했다.
        - 달콤한 꿈：세상을 아무것도 모르던 달콤한 꿈의 나날. 그 꿈에서 깨어난 것이 행복이었을까, 불행이었을까. 아니면 지금도 여전히 꿈속일까.
        - 미모：누구나 부러워하고 돌아보게 되는 미모. 그 아름다움은 주위에 널리 알려졌고, 기사들조차 그대를 찬미했다.
        - 요정의 벗：요정을 끌어당기는 기묘한 매력을 타고났다. 어린 시절부터 그대는 요정과 짐승의 벗이었다.
        - 기사의 봉사자：그대는 아름다운 기사 밑에서 일하고 있었다. 신뢰와 동경을 키워 왔고, 그 입장에 자부심도 품고 있었지만⋯.
        - 신동：그대는 넘치는 재능을 타고났다. 기사로 성장하리라 여겨졌지만⋯.
      RS:
        name: 근황 표
        year_title: 활동 년 수
        items:
        - 악몽：잠에 들 때마다 수난의 기억이 되살아난다. 그대의 마음은 맑아지지 않고, 끔찍한 악몽이 끊임없이 따라붙는다.
        - 피의 격앙：싸움을 마친 뒤에는 몸이 달아오르고 흥분이 가라앉지 않는다. 어쩔 수 없이 몸이 꿈틀거린다. 타락의 날은 머지않았다⋯ 그대는 그렇게 확신하고 있다.
        - 도주：이단 심문관에게 쫓겨 오래 살던 땅을 떠나야 했다. 백성들 또한 이단을 의심스러운 눈으로 바라본다. 살아가기 힘들다.
        - 타락의 공명：그대의 영혼은 이미 타락해 가고 있는 것일까. 타락한 자들이 어쩐지 가까운 존재처럼 느껴진다.
        - 죽음을 원하는 자：이미 지겹도록 살았다. 타락자나 태양을 조금이라도 끌어들여⋯ 자신에게 어울리는 장소에서 사라지고 싶다.
        - 재서훈의 의식：기사를 이단경으로 바꾸는 방법을 그대는 알고 있다. 그리고 실제로 한 명의 이단경을 만들어 내기도 했다.
        - 개심：과거의 그대는 형편없는 악당이었다. 마음을 고쳐먹었지만⋯ 이단을 향한 세상의 시선은 여전히 냉혹하다.
        - 추적：타락한 친구를 찾고 있다. 그가 소중하기에, 그 일은 반드시 자신의 손으로 끝내야 한다.
        - 폭풍의 예감：그대에게는 예감이 있다.  상야국 가까운 곳에서 끔찍한 재앙이 일어날 것이다. 가능한 한 많은 이들에게 알려 대비해야 한다.
        - 가면：상처받는 것이 두려워 표정을 꾸몄다. 진짜 자신을 숨겨 왔다. 이제 그대는 진짜 자신이 어떤 존재인지조차 잊어버리고 있다⋯.
        - 묘지기：가까웠던 이들이 죽어 묻힌 무덤을 지키고 있다. 모두가 사원의 묘지에 묻히는 것은 아니기 때문이다.
        - 공백：지금의 몸이 된 이후 기억나지 않는 시기가 있다. 그 사이에 무슨 일이 있었는지, 그대는 전혀 알지 못한다.
        - 실연：그대가 이단이기 때문일까, 아니면 성격 때문일까. 한 번의 사랑이 끝났다. 지금도 상심한 채로 떠돌고 있다.
        - 주군을 위하여：기사인가 이단인가. 그대에게는 마음속으로 섬기기로 정한 주군이 있다. 그분의 명령에 따라 그대는 움직인다.
        - 햇병아리：그대는 아직 막 이단이 되었을 뿐이다. 얻은 힘에 휘둘리고 있으며, 수난을 겪어도 아직 깨닫지 못한다. (※오래된 이단은 선택할 수 없다)
        - 권태：변하지 않는 일상, 보람 없는 나날. 서서히 썩어 가는 감각. 이대로 자신을 잃고 타락해 버리는 것일까.
        - 은둔：백성의 시선과 기사들의 시선은 평온을 깨뜨린다. 그대는 자신의 평온을 위해 혹독한 자연 속에서 은둔하고 있다.
        - 사랑이 갖고 싶다：쓸쓸하고 사람이 그리운 나날. 누군가를 믿고 싶다. 누군가에게 믿어지고 싶다. 이용당해도 좋으니 사람의 곁에 있고 싶다.
        - 마녀의 예언：그대는 예언에 이끌리고 있다. 누군가를 반드시 만나야 한다. 그가 주군일지, 친구일지, 연인일지⋯ 혹은 적일지라도.
        - 관망인：백성들이 변해 가는 모습을 조용히 바라보고 있다. 그대는 빠르게 변하는 그들을 지켜보는 것을 좋아한다.
        - 후계 찾기：그대는 자신의 마음을 움직일 백성을 찾고 있다. 그를 자신과 같은 존재로 바꾸어 영원한 시간을 함께 보내기 위해서다⋯.
        - 고블린：고블린들의 사랑을 받고 있다. 그들은 종종 그대 앞에 나타나 작은 장난이나 선물을 남기고 간다.
        - 피의 후계：그대는 마음에 든 자를 동로 받아들인 적이 있다. 그리고 그와의 관계는 지금도 이어지고 있다.
        - 신비의 전승：신비한 기술을 백성이나 다른 이단에게 전하고 있다. 오래된 지식을 전하기 위해서, 혹은 단순히 놀라는 얼굴을 보기 위해서.
        - 변혁의 봉화：이단이라 멸시받고 이런 처지로 몰린 현실을 그대로 둘 것인가? 일어나서 바꾸어야 하지 않겠는가?
        - 백성과 함께：오랫동안 백성과 어울려 살아왔다. 많은 감사와 약간의 의심을 받으며 살아가고 있다.
        - 방랑벽：한 곳에 머물 엄두가 나지 않는다. 당신은 늘 길을 걸으며 수많은 마을, 수많은 도시를 건너다녔다.
        - 백성 속에서：적극적으로 백성과 교류하며 그들의 삶에 관여하고 있다. 그대는 인간을 좋아하며, 그들과 접할 때 비로소 자신을 느낄 수 있다.
        - 은혜 갚기：과거에 한 기사나 이단에게 도움을 받았다. 언젠가 그 은혜를 갚아야 한다.
        - 기사의 친구：기사와 시간을 보내며 신뢰를 쌓았다. 기사라는 존재에 대한 거부감은 적다. 서로 도울 수 있을 것이다.
        - 긴 잠：일찍이 귀경은 남몰래 태양의 파편과 싸우다 몸의 대부분을 잃고 잠들었었다⋯ 꽤 오랫동안 잠들어 있었던 것 같다.
        - 영웅의 별：만났던 마녀가 예언했다⋯ 언젠가 그대는 무서운 적을 쓰러뜨리고, 그 이름이 여러 영지에 울려 퍼질 것이라고.
        - 인도하는 자：많은 이단들이 멸시받는 처지를 받아들이고 타락해 간다. 그대가 그들에게 긍지와 가족, 사랑을 가르쳐야 한다.
        - 자애：그대는 모든 것을 사랑한다. 지금은 불행한 오해가 있더라도 그들을 구하려는 손을 거두어서는 안 된다.
        - 살아 있는 예술：그 아름다움 때문에 그대에게 평온은 없다. 모습을 보는 것만으로도 누구나 그대를 동경하고 사랑을 바치려 한다.
        - 전설：그대는 이단이지만 상야국의 역사에 적지 않게 관여해 왔다. 음유시인들에게 노래되는 전설적인 존재다.
      PP:
        name: 평화로운 과거 표
        year_title: 외모 연령
        items:
        - 난폭자：성미가 급하고 기질이 거칠어, 무심코 손이 나가 난폭한 짓을 저지르고 만다. 고향에서의 평판도 그리 좋지 않았다. 지금은 어떨까?
        - 고아：부모 형제도 없이, 오직 혼자 지혜를 짜내어 살아왔다. 자유롭기는 했지만, 혹독한 환경 속에서 그대의 영혼은 단련되어 왔다.
        - 절대적인 공포：어떤 생물이 도저히 견딜 수 없을 만큼 무섭다. 아무튼 생리적으로 도저히 안 된다. 그것을 보는 순간 그대는 꼴사납게 펄쩍 뛰며 도망치고 만다.
        - 술주정：예전부터 술에 취하면 영 좋지 않은 짓만 해 왔다. 이제 더 이상 백성이 아니니 술에 취하지는 않을 터이지만⋯.
        - 게으름뱅이：재능은 있어도 움직이는 것이 너무나 귀찮다. 언제나 어떻게든 편하게 지낼 방법만 생각해 왔다.
        - 내성적：겁이 많고 낯을 가리는 성격이다. 사람과 어울리는 일도 서툴다. 관계는 깊고 좁다. 그런 그대에게도 인연은 생기기 마련이지만⋯.
        - 혈기왕성：예전부터 너무 성급하다는 말을 들어 왔다. 하지만 세월이 지나도 기질은 고쳐지지 않았다. 그대의 마음은 지금도 젊고 미숙하다.
        - 소꿉친구：매우 친한 소꿉친구가 있어 미래에 대해 이야기하곤 했다. 지금 그 사람은 어떻게 지내고 있을까.
        - 잊을 수 없는 맛：그대에게는 도저히 잊을 수 없는 가장 좋아하는 음식이 있다. 이제 백성이 아니게 된 지금도, 그것만은 정신없이 먹어 버릴 것이다.
        - 둔감한 사람：예전에 여러 이성에게 마음을 받았지만, 그대는 전혀 눈치채지 못했다. 최근에야 문득 떠올리고서야 깨달았다.
        - 어떤 이별：친구나 가족이 기사 혹은 이단이 되어 고향을 떠났다. 그러나 같은 시간을 살아가는 지금이라면, 분명 다시 만날 수 있을 것이다.
        - 책벌레：조용히 책을 읽는 것을 좋아한다. 책 속의 세계, 자신의 세계에 몰두하고 싶다. 밖에서 뛰어다니는 것은 서툴다.
        - 반항아：남의 말을 도무지 순순히 듣지 못한다. 무심코 반항해서 주변에 폐를 끼치곤 한다. 세월이 지나도 변하지 않았다.
        - 분위기파：여러 번 실패하면서도 금세 들떠 버린다. 기세에 맡겨 무모한 행동을 하기 쉽다.
        - 호기심：눈길을 끄는 것이 있으면 반드시 쳐다보고 만다. 비밀이라면 파헤치지 않고는 견딜 수 없다. 모른 채 넘어갈 수는 없는 것이다.
        - 설교벽：남의 행동거지가 자꾸 눈에 띄어 무심코 잔소리를 하게 된다. 스스로에게도 엄격하려고 하지만⋯.
        - 힘자랑：타고난 체격과 신체 능력으로 고향에서는 견줄 자 없는 힘자랑이었다. 물론 어디까지나 백성으로서는⋯이지만.
        - 자연 속에서：고향이 벽지에 있었던 것일까. 아니면 들에서 살아왔던 것일까. 그대는 자연에 녹아들어 자연을 잘 알고 있다.
        - 여행자：여러 마을과 도시를 오가던 여행자였다. 떠도는 이단이나 편력하는 기사 가운데에도 아는 사람이 제법 있다.
        - 자유를 갈망하며：평범한 나날에 대한 반발. 자신이라는 틀을 넘어 이단이 되어 버리면 분명 자유로워질 것이라 생각했다.
        - 이루어질 수 없는 첫사랑：어떤 백성을 사랑했다. 사랑은 이루어지지 않았고 그 사람은 그대의 앞에서 사라졌다. 하지만 그 미소는 지금도 그대에게 힘을 준다.
        - 기묘한 첫사랑：한 이단을 만나 그 아름다움에 사랑에 빠졌다. 그를 좇아 모든 것을 버리고⋯ 마침내 같은 시간을 살아가는 몸이 되었다.
        - 변덕：눈앞의 것에 쉽게 정신이 팔린다. 차분히 생각하지 못한다. 나이를 먹어도 변하지 않는 성미다.
        - 새와 짐승의 벗：새나 짐승의 뜻을 어렴풋이 알 수 있다. 그대는 그들의 친구이며 여러 상황에서 도움을 받았고 또 도움을 주어 왔다.
        - 요정의 벗：요정을 끌어당기는 기묘한 매력을 타고났다. 어린 시절부터 그대는 요정과 짐승의 친구였다.
        - 참견쟁이：주변 사람들이 자꾸 신경 쓰인다. 곤란해하는 사람이 있으면 성가셔해도 끼어들고 마는 성미다.
        - 순수한 영혼：속세의 사념에서 너무나 멀리 떨어져 살아왔기에 그대의 영혼은 끝없이 티 없이 아름답다. 그리고 연약하다.
        - 수도자：진조의 사원에서 주교를 섬기던 수도자였었다. 물론 이단 심문 같은 편협한 생각을 가진 것은 아니다.
        - 평온：그대는 가족에게 둘러싸여 사랑이 가득한 삶을 살았다. 평범한 생활, 평범한 나날. 아주, 아주 행복했다.
        - 성실한 사람：고향에서는 성실하기로 이름이 났다. 진실한 인품으로도 알려져 있었다. 그 기질은 지금도 변하지 않아 여유 있게 행동하지 못한다.
        - 숙련자：어떤 전문 기술에 천재적인 능력을 지니고 있다. 고향의 영주조차 그대의 의견과 기술을 의지했을 정도다.
        - 열애：깊고 격렬한, 열병 같은 사랑을 한 적이 있다. 그 사랑의 불꽃은 지금도 그대 안에서 잔불처럼 타오르고 있다.
        - 미모：누구나 부러워하고 돌아보게 되는 미모. 그 아름다움은 널리 알려졌고 기사들조차 그대를 찬미했다.
        - 마녀의 제자：고향 근처에 살던 마녀에게 귀여움을 받았다. 약초와 점술, 이단에 대해 그대는 남보다 잘 알고 있을 것이다.
        - 기사의 벗：어떤 기사에게 깊은 총애를 받아 왔다. 아니, 신분 차이를 넘어선 우정과 친애라 해도 좋을 대등한 유대를 맺었다.
        - 혈통을 잇는 몸：반려를 얻고 아이를 낳아 가정을 이루었다. 그 피는 그대가 더 이상 백성이 아닌 몸이 된 지금도 이어지고 있다.
      ST:
        name: 원풍경 표
        d66_sort_type: NO_SORT
        items:
          11: 학대：지옥과도 같았던 나날 속에서 귀경이 겪어 온 일을 떠올리면⋯ 기사가 된 지금도 사람을 바라보는 눈은 어둡다.
          12: 들개처럼：고아였던 귀경은 도둑질하고, 죽이고, 속이며 살아남았다. 수단은 가리지 않았다. 결국 죄인으로서 기사 앞에 끌려갔다.
          13: 악행：귀경은 서훈을 받기 전, 사악하고 부도덕한 행위에 손을 대고 있었다. 다행히도 주군에게 들키지 않은 채 기사가 되었지만⋯ 그 행실은 과연 바로잡혔을까?
          14: 저주받은 불꽃：고향은 태양의 파편에 습격당했다. 가족은 목숨을 잃었고, 한 기사가 귀경을 구해 주었다. 그 저주스러운 불길을 귀경은 잊지 않는다.
          15: 태양의 꿈：지금은 사라진 태양이 비추던, 아름답고 생명으로 가득한 세계를 귀경은 어린 시절부터 꿈에서 본다. 설명할 수 없는 의문이 마음속에서 사라지지 않는다.
          16: 검은 충동：폭력성과 잔혹성이 귀경 안에 잠들어 있다. 그것은 때때로 갑작스럽게 모습을 드러내어⋯ 소중한 것을 파괴해 버린다.
          21: 얼어붙은 마음：혹독한 나날 속에서 귀경의 마음은 얼어붙었다. 능력을 인정받아 기사가 되었지만⋯ 그 마음의 얼음은 아직 녹지 않았다.
          22: 겁쟁이：예전에 귀경은 맞서야 할 것에서 도망쳤다. 그것은 기사가 된 지금도 남아 있는 마음의 짐이다.
          23: 고독：귀경은 늘 고독했다. 손을 내밀어 준 이는 오직 주군뿐. 주군 없는 나날 따위는 상상할 수 없다.
          24: 야망：귀경은 더 높은 지위를 원한다. 평범한 백성으로는 부족하다. 기사가 되고 싶다. 더 많은 것을 지배하고 싶다.
          25: 쉽게 반한다：귀경은 쉽게 사랑에 빠진다. 작은 인연만 있어도 연인이라 믿고, 진심으로 헌신해 버린다.
          26: 가까운 타락：고향의 영주는 타락하여 폭정을 저질렀다. 귀경은 기사라는 존재를 다른 이들처럼 순진하게 믿을 수 없다.
          31: 망상：꿈꾸기 좋아하는 귀경은 스스로 기사가 되는 상상을 수없이 해 왔다. 지금도 혹시 꿈을 꾸고 있는 것일까?
          32: 공백：과거의 시간 속에는 기억나지 않는 시기가 있다. 그 사이에 무엇이 있었는지, 귀경은 전혀 알지 못한다.
          33: 경건한 마음：귀경은 백성이었을 때부터 붉은 달과 드라클을 깊이 신앙해 왔다. 끊임없는 신앙이야말로 자신을 기사로 이끌었다고 믿는다.
          34: 요정의 인도：들어가서는 안 되는 숲에서 요정과 친해졌다. 장난치며 놀던 사이, 정신을 차려 보니 기사들의 성에 와 있었다.
          35: 종자의 가문：태어날 때부터 종자로 살아가는 일족이 있다. 귀경은 그곳에서 태어나 재능을 인정받아 기사로 발탁되었다.
          36: 백성의 마음：평범한 민가에서 오래 자란 귀경은, 세속적이지만 백성의 시야를 가진 기사로 성장할 것이다.
          41: 유랑：귀경은 백성이었을 무렵부터 유랑하는 몸. 시야를 넓히기 위한 여행이었지만, 종자가 되어 이 땅에 정착하게 되었다.
          42: 백성의 혈연：혈연 중 한 사람이 기사가 되었다. 그리고 귀경 또한⋯ 귀경은 같은 기사 중에, 백성으로부터의 혈연이 있는 것이다.
          43: 요정의 친구：요정을 끌어당기는 기묘한 매력을 가지고 태어났다. 어릴 때부터 귀경은 요정이나 짐승의 친구다.
          44: 순수한 영혼：속세의 사념과 멀리 떨어져 살아왔기 때문에 귀경의 영혼은 너무나 고결하고 아름답다. 그리고 깨지기 쉽다.
          45: 전장의 짐승：주인과 함께 귀경은 수많은 전장을 건너왔다. 전투는 귀경의 호흡이자 발걸음이다. 어디에 있든 전투의 기운은 놓치지 않는다.
          46: 오래된 격식：귀경은 격식을 매우 중요시하는 땅에서 나고 자랐다. 비록 그것이 유명무실한 것이라고 할 지라도 옛 격식을 잊는다면 그것을 어찌 기사라 할 수 있는가.
          51: 카리스마：사람들에게 신뢰받고 주목받기 쉽다. 귀경은 태생적으로 사람들을 이끄는 존재다. 기사에게 필요한 재능일 것이다.
          52: 단련의 나날：기사가 되는 날을 목표로 어린 시절부터 무예를 갈고닦아 왔다. 이제 귀경은 그만한 무용을 얻었다.
          53: 은혜 갚기：과거 귀경은 한 기사에게 도움을 받았다. 그 은혜를 갚기 위해 종자가 되었고⋯ 마침내 기사로 서훈을 받았다.
          54: 기사의 양자：어린 시절 발견되어, 철이 들 무렵부터 기사에게 직접 교육과 훈련을 받으며 자랐다. 백성일 때의의 부모는 알지 못한다.
          55: 영웅 지망：보호받는 백성으로서의 삶은 견딜 수 없었다. 귀경은 영웅의 길을 찾아 집을 뛰쳐나와 종자가 된 것이다.
          56: 불타는 사랑：첫눈에 어떤 기사에게 사랑에 빠졌다. 백성의 몸으로는 이루어질 수 없는 사랑. 그러나 귀경은 마침내 서훈을 받고 기사가 된 것이다.
          61: 구원의 마음：백성들은 여러가지 두려움에 떨며 고통받는다. 자신의 힘으로 어떻게든 할 수만 있다면⋯ 그렇게 귀경은 기사의 길을 선택했다.
          62: 미색：귀경의 아름다움이 소문이 나자, 그 미모를 들은 한 기사가 찾아와 귀경을 성으로 인도했다.
          63: 동경하는 기사：귀경에게는 동경하는 기사가 있다. 언젠가 반드시 그 사람과 같은 위치에 설 것이라고 다짐하게 만든 인물이 있는 것이다.
          64: 드라클의 꿈：어느 날 꿈속에서 드라클이 귀경에게 강림했다. 그리고 인생의 모든 것을 바꾸는 신탁을 하사하신 것이다.
          65: 신동：때로는 귀경처럼 넘치는 재주를 가지고 태어나는 자가 있다. 그리고 정해진 것처럼 기사의 길을 걷는다.
          66: 운명의 아이：귀경이 태어났을 때 방랑하는 현자가 찾아왔다. 귀경은 분명 전설에 남을 기사가 될 것이다. 그렇게 약속되어 있다.
      PN:
        name: 수난 표
        d66_sort_type: NO_SORT
        items:
          11: 지옥：기사의 손에 의해 그대는 한 번 지옥에 봉인된 적이 있다. 간신히 탈출할 수 있었던 것은, 행운 외에는 달리 설명할 길이 없을 것이다.
          12: 폭발한 살의：죽일 생각 따위는 없었다. 그저 사소한 말다툼에서 순간 화가 치밀어 올라⋯ 한 명의 백성을 그대의 손으로 죽이고 말았다.
          13: 복수의 길：예전에 그대는 친구에게 배신당해 모든 것을 빼앗겼다. 이제 그대의 삶은 옛 친구를 묻어버리기 위해 존재한다.
          14: 이단 심문：그 끔찍한 이단심문관들에게 붙잡혀 굴욕과 고통을 겪었다. 그 자들의 존재 따위는 결코 인정하지 않겠다⋯
          15: 원수：잊어서는 안 되는 적이 있다. 그 자의 가슴을 꿰뚫고 목을 베기 전까지 그대에게 안식의 날은 오지 않는다. 결코 오지 않는다.
          16: 타락의 누명：한 기사가 타락했다. 그러나 백성과 다른 기사들은 그 죄를 당사자가 아니라⋯ 이단인 그대에게 뒤집어씌웠다.
          21: 저주받은 불꽃：고향은 태양의 파편에 습격당했다. 모든 것이 불타고 그대 또한 상처를 입었다. 그 저주스러운 불길을 결코 잊지 않겠다.
          22: 참극에 서 있다：정신을 차리고 보니 수많은 백성의 피와 살이 흩날리는 참극 한가운데에 서 있었다. 이것이 정말 그대의 소행이었던 것일까⋯? 대답해 줄 이는 없다.
          23: 이형에 대한 거부：예전의 그대는 자신의 이단의 몸을 받아들일 수 없었다. 몇 번이나 자신의 이형을 잘라내며 타락의 낭떠러지에서 방황했다.
          24: 타락의 이정표：무심코 던진 말이 친구의 마음을 상처 입혔다. 그 자는 결국 타락했다. 그대의 말이 계기가 아니라고 어떻게 말할 수 있겠는가.
          25: 힘에 취하다：이단의 힘을 얻고 의기양양해졌다. 스스로를 왕이라 믿고 백성에게 폭정을 저질렀다. 곧 자신의 잘못을 깨닫기는 했지만⋯.
          26: 가까운 타락：친구나 연인이 타락했다. 잊을 수 없는 과거다. 자칫하면 자신 또한 그렇게 될지도 모른다는 어두운 미래를 떠올리게 된다.
          31: 백성에 대한 실망：신뢰를 쌓아 온 백성들이 이단심문관의 말에 휘둘려 그대를 욕하기 시작했다. 그대가 도대체 무엇을 했다는 것인가.
          32: 백성의 함정：따뜻하게 환영받고 숙소에 묵게 되었지만⋯ 잠든 그대를 습격한 것은 이단심문관이었다. 이제 백성 따위 믿지 않는다.
          33: 이단경의 친구：그대가 잘 아는 이단이, 그대의 친구인 기사를 재서훈하여 이단경으로 바꾸었다. 그대만이⋯ 아무것도 듣지 못한 채였다.
          34: 타락자의 모습：그대는 타락자에게 습격당했다. 가까스로 살아남았지만 그 괴물의 모습은⋯ 언젠가 자신도 그렇게 되는 것일까.
          35: 그래도 힘이：그대는 기사가 되지 못했다. 그럼에도 힘을 원해⋯ 이단에게 매달려 예속의 대가로 힘을 얻었다.
          36: 돌팔매질：인간이 아닌 힘을 지닌 그대에게 백성들은 돌을 던지며 쫓아냈다. 아무것도 하지 않았는데도⋯ 이제 백성을 믿을 수 없다.
          41: 저주：요정에게 저주를 받았다. 저주는 천천히 그대를 잠식하며 몸에 재앙을 부른다. 이제는 풀린 것일까?
          42: 바라지 않은 구원：수난에서 그대를 구한 이는 더 큰 재앙이었다. 구원자는 폭군이 되어 그대의 모든 것을 지배했다.
          43: 더러운 일：기사에게 고용되어 비열한 일을 했다. 결국 모든 오명을 뒤집어쓰고 그 땅에서 도망칠 수밖에 없었다.
          44: 이단의 거처：가서는 안 될 곳에 갔고 만나서는 안 될 이단을 만났다. 그 일 이후 그대는 고향으로 돌아갈 수 없는 몸이 되었다.
          45: 사별：특별한 존재였던 백성이⋯ 잠시 보지 못한 사이 죽어 있었다. 그를 이단으로 바꾸어 함께 시간을 보내려 했건만.
          46: 진실한 사랑：지금까지의 사랑은 그저 욕망이었음을 깨달았다. 그대는 진정한 사랑을 알게 되었다. 모든 것이 늦어버린 뒤에야⋯.
          51: 거절：사랑했던 백성이 있었다. 그를 이단으로 바꾸어 긴 시간을 함께하고 싶었지만⋯ 당사자에게 거절당했다.
          52: 마지막 발버둥：백성으로서 죽을 뻔했다. 깨끗이 죽었어야 했지만⋯ 마지막 순간 집착에 사로잡혔다. 대가를 치르고 이단이 되었다.
          53: 죽음의 맛：그대는 분명 한 번 죽었을 것이다. 생명을 잃고 몸이 차가운 덩어리로 변해 가던 그 순간을⋯ 너무도 잘 기억하고 있으니까.
          54: 요정의 인도：들어가서는 안 될 숲에서 요정과 친해졌다. 장난치며 놀던 사이 정신을 차려 보니 낯선 땅과 시대에 와 있었다.
          55: 걸림돌：사소한 실수가 마음속에 침전물처럼 남아 있다. 이 근심이 사라질 날이 올까.
          56: 망각：그대에게 끔찍한 일이 있었던 것만은 분명하다⋯ 하지만 기억이 나지 않는다. 도대체 무슨 일이 있었던 것일까?
          61: 인간이 아닌 사랑：그대는 이단과 사랑에 빠졌다. 달콤하고 광기 어린 시간 속에서 세월이 흘렀고, 결국 그 연인의 손으로 이단의 몸을 얻었다.
          62: 주인의 변덕：그날 그대는 분명 죽었어야 했다⋯ 그러나 지나가던 주인이 그대를 이단으로 바꾸어 구해 주었다.
          63: 비극의 예언：마녀가 그대에게 예언했다⋯ 언젠가 가장 소중한 사람을 자신의 손으로 죽이게 될 것이라고.
          64: 유혹：그대는 외로운 이단을 달콤한 말로 유혹해 마음을 흔들고 동포로 삼게 했다. 정신적인 면에서의 주인은 오히려⋯
          65: 고독：그대는 늘 고독했다. 이단이 된 지금도 고독하다. 이대로 타락을 기다릴 뿐일 것이라 생각했지만⋯
          66: 물 안의 개구리：스스로가 최강이라 믿고 있던 그대였지만⋯ 한 명의 기사를 보고 그 생각은 무너졌다. 세계는 아직도 넓다.
      CS:
        name: 타락의 전조표
        type: 2D6
        items:
        - 당신은 완전히 타락했다. 이 시점에서 당신은 [월 플라워]가 되어 늑대인간, 검은 산양, 야수 중 하나가 된다. 그 [막]의 종료 후에 세션에서 퇴장한다. 247페이지의 「소멸・완전한 타락」을 참조한다.
        - 짐승 그 자체의 머리(늑대, 산양, 박쥐 중 하나)
        - 밤새의 날개
        - 박쥐의 날개
        - 갈퀴발톱이 있는 이형의 팔
        - 뒤틀린 두 개의 뿔
        - 늑대의 귀와 꼬리
        - 창백해진 피부
        - 이상한 빛을 발하는 눈
        - 튀어나온 송곳니
        - 눈에 보이는 변화는 없다……
      ECS:
        name: 확장・타락의 조짐 표
        d66_sort_type: NO_SORT
        items:
          11: 완전한 타락：귀경은 〔벽의 꽃〕이 되어 타락자 중 하나로 변한다. 그 〔막〕이 끝난 뒤 세션에서 퇴장한다. (기본 규칙서 247페이지 참조)
          12: 기괴한 체구：몸이 부풀어 오른 듯 과도한 근육이 붙고, 체격 또한 거대한 몸집이 된다. 타락은 가까워졌다.
          13: 살육귀：백성과 접촉하면 더 이상 충동을 억누를 수 없다. 찢어 죽이고 피를 빨아 버린다. 백성에게 가까이 가서는 안 된다⋯
          14: 짐승의 머리：머리가 늑대, 흑산양, 혹은 박쥐 그대로의 모습이 된다. 멀리서도 알아볼 수 있는 이상한 모습이며, 늑대인간으로 오해받아 토벌당한한 기사도 있다고 한다.
          15: 원초의 갑옷：몸 대부분이 단단한 칠흑의 덩어리로 변해, 불길한 괴물 같은 모습이 된다. 얼굴 또는 얼굴의 절반 정도는 원래 형태를 유지할 수 있을 것이다.
          16: 밤새의 날개：등에 검은 새의 날개가 돋는다. 이미 스트리가와 다를 바 없어, 귀경은 언제나 이단과 함께 묶여 조롱받을 것이다.
          21: 박쥐의 날개：등에 박쥐 날개가 돋는다. 결코 숨길 수 없으며 제한적이나마 하늘을 날 수 있다⋯ 털이 난 검은 날개다.
          22: 갈라진 피부：온몸의 피부가 갈라진다. 그 틈에서 붉은 빛이 스며나온다. 모습이 아무리 아름다워도, 이제는 괴물일 뿐이다.
          23: 퇴폐의 향기：몸에서 달콤하고 정신을 흐리게 하는 향기가 난다. 기사에게는 소용없지만, 백성에게는 마약이나 최음제처럼 작용한다.
          24: 이형의 팔：악귀를 연상시키는 갈고리 발톱을 지닌 팔. 표면은 타르 같은 칠흑의 덩어리로 덮여 있으며, 뒤틀린 흉악한 형태다.
          25: 귀화를 품은 눈：눈에 귀화가 깃든다. 그 기이한 빛은 눈에서 넘쳐 불꽃처럼 흔들린다. 이제 그대를 제대로 마주 볼 사람은 없다.
          26: 악의 가시：팔꿈치, 무릎, 주먹, 이마 혹은 뜻밖의 곳에서 검거나 붉은 날카로운 가시가 자란다. 주변 피부도 점차 단단해진다.
          31: 기괴한 각인：얼굴을 포함한 전신 피부에 붉은 빛의 이단 같은 각인이 나타난다. 욕망의 성질에 따라 그 문양은 끊임없이 변화한다.
          32: 독사：어깨에서, 혹은 꼬리처럼 흉악한 독사가 자라난다. 소매나 옷자락 아래에서 보이면 구현된 사역수처럼 보일 수도 있지만…
          33: 제3의 눈：이마에 제3의 눈이 열린다. 머리카락이나 후드로 가릴 수는 있겠지만 완전히 숨기기는 어렵다.
          34: 퍼져 가는 비늘：몸 곳곳이 비늘로 덮이기 시작한다. 천천히 퍼져 나가며 결국 숨길 수 없게 될 것이다.
          35: 짐승의 울음：몸 안에서 짐승의 울음소리가 들리기 시작한다. 곧 짐승 냄새도 풍기게 된다. 이미 안쪽부터 짐승이 되어 가고 있다.
          36: 변신：어째서 이런 일이⋯ 귀경은 성별, 외견 상의 나이, 체격 중 하나 혹은 모두가 크게 변해 버린다.
          41: 염소의 뿔：머리에서 두 개의 길고 뒤틀린 염소 뿔이 자라난다. 이 뿔은 어떤 구현으로도 숨길 수 없다.
          42: 송곳니뿐인 입：치아가 모두 송곳니로 변하고 입 자체도 크게 벌어지게 된다. 미소조차 위협처럼 보일 것이다.
          43: 용의 날개：등에 비늘로 덮인 강인한 날개가 자란다. 활공 정도는 가능하다. 다행히도 용의 날개는⋯ 길조로 보는 기사도 많다.
          44: 염소의 다리：옷으로 간신히 숨길 수 있다는 것이 위안이다⋯. 다리는 검은 염소의 것이 된다. 본 사람은 혐오로 얼굴을 찌푸릴 것이다.
          45: 늑대의 귀와 꼬리：머리에 늑대 귀가, 엉덩이에 늑대 꼬리가 생긴다. 이것들은 짐승처럼 감정에 맞춰 움직인다.
          46: 어둠이 넘치는 눈：눈의 흰자가 검게 변한다. 그리고 눈에서 어둠이 스며 나와 검은 불꽃처럼 흔들린다.
          51: 창백한 피부：시체처럼 차갑고 기묘하게 창백한 피부가 된다. 한눈에 보아도 타락이 분명하다.
          52: 발작적 변신：【갈증】이 증가할 때마다 귀경의 모습은 잠시 특정 타락자의 모습으로 변한다. 끔찍한 결말을 암시하는 징조다.
          53: 구현의 불안정：구현이 불안정해진다. 귀경이 만들어내는 모든 것은 뒤틀리고 우아함을 잃은 괴물이 된다.
          54: 기묘하게 빛나는 눈：눈이 도깨비불처럼 빛난다. 그 빛은 어둠 속에서 흉악한 꼬리를 끌며 무의식적으로 먹잇감을 노린다.
          55: 두드러진 송곳니：덧니라고 부르기에는 너무 길고 날카로운 송곳니. 입맞춤할 때 자칫 상대의 피부를 상처 낼지도 모른다⋯.
          56: 마녀의 발톱：손발의 손톱이 기묘한 갈고리 발톱이 된다. 구현화로 속일 수도 없다⋯. 항상 장갑이나 건틀릿을 끼면 가능할까.
          61: 힘 조절 불능：귀경의 힘은 점점 제어하기 어려워진다. 무심코 가구를 부수거나 백성을 다치게 할 수도 있다.
          62: 긴 혀：혀가 자신의 눈에 닿을 정도로 길어진다. 다행히 일부러 내보이지 않는 한 밖에서는 알아채기 어렵다.
          63: 발칙한 입맞춤：입맞춤할 때마다 기묘한 욕망이 솟구친다. 그 행동은 점점 비천하고 음란해진다.
          64: 타락의 그림자：붉은 달빛 아래 귀경의 그림자는 이미 타락자의 것이다. 처음 보는 사람이라면 몰라도 오래 숨길 수는 없을 것이다.
          65: 월광욕：지붕 아래에 있으면 불쾌감을 느낀다. 가능한 한 달빛을 받는 곳에 있고 싶다. 궁정에서도 정원이나 발코니를 선호한다.
          66: 행운：특별한 징조는 느끼지 못할지라도⋯ 스스로를 경계해야 한다. 귀경은 지금 타락의 문턱에 서 있음을 자각하라.
